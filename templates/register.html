{% extends "base.html" %}
{% block title %}Регистрация — Планировщик задач{% endblock %}
{% block content %}
<div class="auth-shell">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="logo-mark">TP</span>
            <h1>Регистрация</h1>
            <p>Создайте аккаунт и начните планировать задачи</p>
        </div>
        {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
        <form method="post" action="/register" class="form">
            <label class="field">
                <span>Логин</span>
                <input type="text" name="username" required autofocus>
            </label>
            <label class="field">
                <span>ФИО</span>
                <input type="text" name="full_name">
            </label>
            <label class="field">
                <span>Email</span>
                <input type="email" name="email" required>
            </label>
            <label class="field">
                <span>Пароль</span>
                <input type="password" name="password" minlength="4" required>
            </label>
            <button type="submit" class="btn btn-primary btn-block">Создать аккаунт</button>
        </form>
        <p class="auth-foot">Уже есть аккаунт? <a href="/login">Войти</a></p>
    </div>
</div>
{% endblock %}
